name: Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run backend tests
        run: uv run pytest tests/ -v --ignore=tests/e2e -x

  # Same suite as backend-tests but against real MySQL. Catches dialect-specific
  # issues that SQLite hides — VARCHAR length overflow (cf. commit 8fb10bf),
  # utf8mb4 collation, transaction semantics, etc.
  #
  # Per-test isolation: tests/conftest.py `_mysql_truncate` is an autouse
  # function-scoped fixture that TRUNCATEs every table after each test and
  # re-seeds the rows session-scoped fixtures depend on (default tenant +
  # warehouse + system_mode + snapshotted admin user). This keeps the
  # session-scoped `_admin_setup` valid across the full suite.
  backend-tests-mysql:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci_pwd
          MYSQL_DATABASE: warehouse_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci_pwd"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15
    env:
      DATABASE_URL: "mysql+pymysql://root:ci_pwd@127.0.0.1:3306/warehouse_ci?charset=utf8mb4"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra test

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -pci_pwd --silent 2>/dev/null; then
              echo "MySQL is up"; exit 0
            fi
            sleep 2
          done
          echo "MySQL did not come up in time"; exit 1

      - name: Apply alembic migrations
        working-directory: backend
        run: uv run alembic upgrade head

      # No -x: we want the full failure list each run while test isolation is
      # still being sorted out. Drop -v if log volume becomes an issue.
      - name: Run backend tests against MySQL
        run: uv run pytest tests/ --ignore=tests/e2e -v

  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra test

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v -x

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
