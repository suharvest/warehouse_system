# 多实例部署：一个镜像，多个独立仓库
# 使用方式: docker-compose -f docker-compose.multi.yml up -d
#
# 默认 3 个实例（一个容器 = 一个完整仓库）:
#   - 仓库A: http://localhost:1025
#   - 仓库B: http://localhost:1026
#   - 仓库C: http://localhost:1027
#
# 需要更多实例？复制一个 service 块，改端口和 volume 名。

x-warehouse: &warehouse-base
  build: .
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 1G                      # 1G：为 mode=local WE2 本地人脸推理留足内存（ai-edge-litert + tflite 模型进程内懒加载）；不用本地推理也无害

services:
  warehouse-a:
    <<: *warehouse-base
    container_name: warehouse-a
    ports:
      - "1025:1025"
    volumes:
      - data_a:/data
    environment:
      PORT: 1025
      DEPLOY_MODE: ${DEPLOY_MODE:-single_tenant}
      FACTORY_API_KEY: ${FACTORY_API_KEY:-}

  warehouse-b:
    <<: *warehouse-base
    container_name: warehouse-b
    ports:
      - "1026:1026"
    volumes:
      - data_b:/data
    environment:
      PORT: 1026
      DEPLOY_MODE: ${DEPLOY_MODE:-single_tenant}
      FACTORY_API_KEY: ${FACTORY_API_KEY:-}

  warehouse-c:
    <<: *warehouse-base
    container_name: warehouse-c
    ports:
      - "1027:1027"
    volumes:
      - data_c:/data
    environment:
      PORT: 1027
      DEPLOY_MODE: ${DEPLOY_MODE:-single_tenant}
      FACTORY_API_KEY: ${FACTORY_API_KEY:-}

volumes:
  data_a:
  data_b:
  data_c:
