# 服务器生产环境 Docker Compose 配置
# 使用预构建镜像，all-in-one 单容器
# 使用方式: docker-compose -f deploy/docker-compose.server.yml up -d

services:
  warehouse:
    image: sensecraft-missionpack.seeed.cn/solution/warehouse:latest
    container_name: smart-wms
    ports:
      - "1025:1025"
    volumes:
      - ../data:/data
    environment:
      - PORT=1025
      - DATABASE_PATH=/data/warehouse.db
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - MAX_IMPORT_ROWS=${MAX_IMPORT_ROWS:-10000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:1025/api/dashboard/stats', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
