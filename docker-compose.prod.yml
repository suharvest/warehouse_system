# 生产环境 Docker Compose 配置（all-in-one 镜像）
# 使用方式: docker-compose -f docker-compose.prod.yml up -d
# 访问: http://localhost:2125

services:
  warehouse:
    build: .
    container_name: warehouse-prod
    ports:
      - "2125:2125"
    volumes:
      - warehouse_data:/data
    environment:
      - PORT=2125
      - DATABASE_PATH=/data/warehouse.db
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - MAX_IMPORT_ROWS=${MAX_IMPORT_ROWS:-10000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  warehouse_data:
    driver: local
